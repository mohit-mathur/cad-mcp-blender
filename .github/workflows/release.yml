name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify version matches tag
        run: |
          TAG=${GITHUB_REF_NAME#v}
          PKG_VER=$(node -p "require('./server/package.json').version")
          MANIFEST_VER=$(python -c "import tomllib; print(tomllib.load(open('addon/blender_manifest.toml','rb'))['version'])")
          echo "tag=$TAG  package.json=$PKG_VER  manifest=$MANIFEST_VER"
          if [ "$TAG" != "$PKG_VER" ] || [ "$TAG" != "$MANIFEST_VER" ]; then
            echo "::error::Version mismatch — bump server/package.json and addon/blender_manifest.toml to $TAG"
            exit 1
          fi

      - name: Build addon zip
        run: python scripts/build_addon.py --out dist

      - name: Create GitHub Release with addon zip
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
